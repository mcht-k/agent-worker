# Agent Runner — configuration
# Place this file at: <repo>/.agent/config.yml

runner:
  max_parallel: 1                    # max concurrent tasks (>1 requires use_worktrees)
  poll_interval_seconds: 30          # daemon sleep between cycles
  task_timeout_seconds: 3600         # kill agent after this many seconds
  max_attempts: 5                    # max retries per task before marking failed
  limit_retry_wait_seconds: 1800     # wait after rate limit hit (30 min)
  store_artifacts: true              # keep logs, transcripts, results

git:
  default_base_branch: main          # branch to fork work branches from
  default_target_branch: main        # branch to merge completed work into
  merge_mode: direct                 # direct | pr | rebase
  on_conflict: review_required       # review_required | retry_rebase | pause
  delete_work_branch_after_merge: false
  use_worktrees: false               # enable for parallel execution
  auto_push: true                    # push after merge
  post_merge_validation: ""          # shell command to run after merge (e.g. "dotnet build")

agents:
  default: claude                    # default agent for new tasks
  allowed:
    - claude
    - gemini
    - codex
    - aider
  models:
    high: claude-opus-4-6            # complex architecture, security reviews
    medium: claude-sonnet-4-6        # typical features, bug fixes, tests
    low: claude-haiku-4-5            # docs, formatting, config changes
  default_model_tier: medium
  auto_rules:                        # auto-assign model tier by task ID pattern
    - pattern: "*-doc*|*-readme*|write-doc*|update-readme*|update-config*|update-queue*"
      model: low
    - pattern: "*-security*|*-architecture*|*-stripe*"
      model: high
    # everything else → default_model_tier (medium)
  smart_tiering:                     # LLM-based task complexity classification
    enabled: false                   # enable to use LLM for model tier selection
    classifier_agent: gemini         # agent to use for classification (cheap/fast)
    classifier_model: low            # model tier for classification (flash/haiku)
    timeout: 60                      # max seconds for classification
  rotation:
    enabled: false                   # enable to auto-switch agents on rate limit
    strategy: on_limit               # switch agent when current one hits limit
    order:                           # rotation priority (first available wins)
      - claude                       # primary: full autonomous agent
      - gemini                       # fallback 1: Google, different limits
      - codex                        # fallback 2: OpenAI, different limits
      - aider                        # fallback 3: code editor, any model backend

notifications:
  ntfy_enabled: false
  ntfy_url: ""                       # e.g. https://ntfy.sh/my-agent-topic
  ntfy_topic: ""                     # alternative: just the topic URL
  events:
    - task_started
    - task_completed
    - task_failed
    - limit_hit
    - queue_empty
    - review_required

