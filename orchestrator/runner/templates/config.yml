  # post_task: after agent succeeds, before merge — lint, format, validate
  post_task: []
    # - name: lint
    #   command: "npm run lint --fix"
    #   required: false

  # post_merge: after successful merge — rebuild, update docs, sync knowledge
  post_merge: []
